<!--
  # Table of Contents

    This file contains a single consolidated template for all visual clients.

  # UI States

    The template has two UI states, defined by the `LoginUiState` enum:
      EMAIL_ENTRY: displays the email input field + continue button
      MASTER_PASSWORD_ENTRY: displays the master password input field + login button
-->

<!-- VaultBox: Simplified login - master password only, no email/SSO/passkey -->
<form [bitSubmit]="submit" [formGroup]="formGroup">
  <!-- Hidden email field (pre-filled with vault@localhost) -->
  <input type="hidden" formControlName="email" />

  <div class="tw-space-y-5">
    <section
      class="tw-rounded-2xl tw-border tw-border-secondary-300 tw-bg-background tw-p-4 tw-shadow-sm"
    >
      <h2 bitTypography="h6" class="!tw-mb-1">Local-first access</h2>
      <p bitTypography="body2" class="tw-mb-2 tw-text-muted">
        {{ "extDesc" | i18n }}
      </p>
      <p bitTypography="body2" class="tw-mb-0 tw-text-muted">
        {{ "masterPassHintDesc" | i18n }}
      </p>
    </section>

    <!-- Master Password input -->
    <bit-form-field class="!tw-mb-1">
      <bit-label>{{ "masterPass" | i18n }}</bit-label>
      <input
        type="password"
        formControlName="masterPassword"
        bitInput
        appAutofocus
        autocomplete="current-password"
        #masterPasswordInputRef
      />
      <button type="button" bitIconButton bitSuffix bitPasswordInputToggle></button>
    </bit-form-field>

    <div class="tw-flex tw-flex-wrap tw-items-start tw-justify-between tw-gap-3">
      <p bitTypography="body2" class="tw-mb-0 tw-text-muted">
        Need a reminder? Open the local password help page before you try again.
      </p>
      <a bitLink routerLink="/hint" (click)="goToHint()" class="tw-inline-flex tw-items-center">
        Open Password Help
      </a>
    </div>

    <div class="tw-grid tw-gap-3">
      <!-- Submit button to Login with Master Password -->
      <button type="submit" bitButton bitFormButton block buttonType="primary">
        {{ "loginWithMasterPassword" | i18n }}
      </button>
    </div>
  </div>
</form>
