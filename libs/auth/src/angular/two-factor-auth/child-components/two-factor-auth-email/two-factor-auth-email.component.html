<bit-form-field class="!tw-mb-0">
  <bit-label>{{ "verificationCode" | i18n }}</bit-label>
  <input
    bitInput
    type="text"
    appAutofocus
    appInputVerbatim
    autocomplete="one-time-code"
    inputmode="numeric"
    name="verificationCode"
    spellcheck="false"
    [formControl]="tokenFormControl"
    (keyup)="onTokenChange($event)"
  />
</bit-form-field>

<div class="tw-mb-4">
  <button
    type="button"
    bitLink
    linkType="primary"
    class="tw-text-sm"
    appStopClick
    (click)="sendEmail(true)"
  >
    {{ "resendCode" | i18n }}
  </button>
</div>
