<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="VaultBox">
  <!--
    VaultBox app icon — vector source.

    Design language matches apps/browser/src/images/icon128.png so the README
    header, favicon, and store icons all use the same identity. Colours
    sampled from the master raster:
      bg     #1a1b2e   (dark navy rounded square)
      lock   #7dc3f8   (light blue padlock + shackle)
      dot    #5eb9b3   (teal status indicator, top-right)
      shadow #17192d   (status-dot edge + keyhole)
  -->
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="128" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1b2e"/>
      <stop offset="100%" stop-color="#13142a"/>
    </linearGradient>
    <linearGradient id="lockGrad" x1="0" y1="60" x2="0" y2="106" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8ed1ff"/>
      <stop offset="100%" stop-color="#69b6ee"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background -->
  <rect x="2" y="2" width="124" height="124" rx="26" ry="26" fill="url(#bgGrad)"/>

  <!-- Padlock shackle (U-shape, no fill) -->
  <path d="M 44 64 V 48 a 20 20 0 0 1 40 0 V 64"
        stroke="#7dc3f8" stroke-width="9" fill="none" stroke-linecap="round"/>

  <!-- Padlock body -->
  <rect x="34" y="60" width="60" height="46" rx="8" ry="8" fill="url(#lockGrad)"/>

  <!-- Keyhole: circle + tapered slot -->
  <circle cx="64" cy="80" r="4.5" fill="#17192d"/>
  <path d="M 62 80 L 66 80 L 65 92 L 63 92 Z" fill="#17192d"/>

  <!-- Status indicator (top-right corner) -->
  <circle cx="100" cy="30" r="14" fill="#5eb9b3" stroke="#17192d" stroke-width="3"/>
</svg>
