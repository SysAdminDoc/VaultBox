<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b2e"/>
      <stop offset="100%" style="stop-color:#0d0e1a"/>
    </linearGradient>
    <linearGradient id="vault" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#60a5fa"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bg)"/>
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#shine)"/>

  <!-- Vault body -->
  <rect x="136" y="220" width="240" height="180" rx="20" ry="20" fill="url(#vault)" opacity="0.9"/>

  <!-- Vault door lines -->
  <rect x="156" y="240" width="200" height="140" rx="10" ry="10" fill="none" stroke="#1e3a5f" stroke-width="4" opacity="0.5"/>

  <!-- Lock shackle -->
  <path d="M200 220 L200 170 Q200 120 256 120 Q312 120 312 170 L312 220"
        fill="none" stroke="url(#lock)" stroke-width="24" stroke-linecap="round"/>

  <!-- Keyhole circle -->
  <circle cx="256" cy="300" r="24" fill="#1e3a5f"/>
  <circle cx="256" cy="300" r="18" fill="#0d1526"/>

  <!-- Keyhole slot -->
  <rect x="250" y="310" width="12" height="24" rx="4" fill="#0d1526"/>

  <!-- Offline indicator dot -->
  <circle cx="380" cy="132" r="24" fill="#22c55e" opacity="0.9"/>
  <circle cx="380" cy="132" r="12" fill="#4ade80"/>

  <!-- Subtle border glow -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.3"/>
</svg>
