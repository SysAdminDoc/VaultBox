<div class="tw-h-full tw-overflow-y-auto [&>*]:tw-h-full [&>*]:tw-overflow-y-auto">
  <ng-content></ng-content>
</div>
<footer
  class="tw-bg-background tw-border-0 tw-border-t tw-border-secondary-300 tw-border-solid tw-px-2 tw-py-1.5"
>
  <div class="tw-max-w-screen-sm tw-mx-auto">
    <nav aria-label="Primary">
      <ul class="tw-flex tw-flex-1 tw-gap-1 tw-mb-0 tw-p-0">
        <li *ngFor="let button of navButtons" class="tw-flex-1 tw-list-none tw-relative">
          <button
            class="tw-w-full tw-flex tw-flex-col tw-items-center tw-gap-1 tw-rounded-xl tw-px-1.5 tw-py-2 bit-compact:tw-py-1.5 tw-bg-transparent tw-no-underline hover:tw-no-underline hover:tw-text-primary-600 tw-group/tab-nav-btn hover:tw-bg-hover-default focus-visible:tw-outline-none focus-visible:tw-ring-2 focus-visible:tw-ring-primary-600 focus-visible:tw-ring-offset-2 focus-visible:tw-ring-offset-background"
            [ngClass]="
              rla.isActive
                ? 'tw-font-semibold tw-text-primary-600 tw-bg-primary-50'
                : 'tw-text-muted'
            "
            title="{{ button.label | i18n }}"
            [routerLink]="button.page"
            [appA11yTitle]="buttonTitle(button)"
            routerLinkActive
            #rla="routerLinkActive"
            ariaCurrentWhenActive="page"
            type="button"
            role="link"
          >
            <bit-svg
              [content]="rla.isActive ? button.iconActive : button.icon"
              aria-hidden="true"
              class="tw-leading-3 tw-shrink-0"
            ></bit-svg>
            <span class="tw-text-[11px] tw-leading-4 tw-truncate tw-max-w-full">
              {{ button.label | i18n }}
            </span>
          </button>
          <div *ngIf="button.showBerry" class="tw-absolute tw-top-1 tw-left-[calc(50%+8px)]">
            <bit-berry type="status" variant="danger"></bit-berry>
          </div>
        </li>
      </ul>
    </nav>
  </div>
</footer>
